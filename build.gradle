// Root Gradle build for the Town Basket monorepo.
//
// The actual Spring Boot application is configured in apps/api/build.gradle.
// This root build exists so the whole backend can be driven from the repo
// root (e.g. `./gradlew :api:test`) and to hold any future shared config.

tasks.register('printModules') {
    description = 'Lists the Gradle subprojects in this build.'
    doLast {
        subprojects.each { println it.path }
    }
}
