spring:
  application:
    name: town-basket-api

  autoconfigure:
    # Authentication is handled solely by our stateless JwtAuthenticationFilter
    # (SecurityConfig disables httpBasic/formLogin), so Spring Boot's default
    # in-memory UserDetailsService is a dead, unreachable credential. Excluding it
    # removes that credential and the random-password line logged at every boot.
    # NOTE: a property exclude is used (not @SpringBootApplication(exclude=...))
    # because @Modulith's meta @SpringBootApplication wins the annotation merge
    # and silently ignores the annotation-level exclude.
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

  datasource:
    # Env-var driven so the same image runs locally (docker-compose) and in prod.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/townbasket}
    username: ${DB_USERNAME:townbasket}
    password: ${DB_PASSWORD:townbasket}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # The schema is owned by Flyway migrations; JPA only validates against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    # Schema-per-module: each module owns a Postgres schema and its own
    # migration folder. Flyway tracks history in the dedicated `flyway` schema
    # so no single module schema owns the migration metadata.
    schemas: flyway
    default-schema: flyway
    create-schemas: true
    # Schema-per-module migrations use per-module version bands (inventory 4.x,
    # cart 5.x, orders 6.x, … serviceability 8.x). Adding a migration to a lower
    # band after a higher band is already applied is "out of order" for Flyway;
    # allow it since per-module migrations are independent. Without this, an
    # existing DB (e.g. upgraded M2 -> M3) fails validation.
    out-of-order: true
    locations:
      - classpath:db/migration/shared
      - classpath:db/migration/identity
      - classpath:db/migration/catalog
      - classpath:db/migration/inventory
      - classpath:db/migration/cart
      - classpath:db/migration/orders
      - classpath:db/migration/payments
      - classpath:db/migration/serviceability
      - classpath:db/migration/notifications

# Spring Modulith event publication registry (transactional outbox on Postgres).
modulith:
  events:
    jdbc:
      schema-initialization:
        enabled: false   # Schema is created by Flyway (see shared migration).
    republish-outstanding-events-on-restart: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    root: INFO

# CORS allowed origins for the browser-facing apps (override in prod with the
# real domains, e.g. https://town-basket.com,https://admin.town-basket.com).
# CORS is owned by Spring Security (SecurityConfig) reading this property.
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}

# Identity / security (M4).
townbasket:
  security:
    jwt:
      # HS256 signing key. MUST be >= 32 bytes. The value below is a CLEARLY
      # MARKED DEV DEFAULT — override with the JWT_SECRET env var in every real
      # deployment (it is intentionally not a production secret and is in the repo
      # only so local dev / docker-compose work out of the box).
      secret: ${JWT_SECRET:dev-only-insecure-jwt-secret-change-me-32bytes+}
      access-ttl: PT15M   # access token lifetime (15 minutes)
      refresh-ttl: P30D   # refresh token lifetime (30 days)
    ratelimit:
      # Per-client-IP rate limit on the auth endpoints (phone/verify, staff/login,
      # refresh; logout exempt) — in-memory fixed window, no Redis. Defaults below.
      capacity: 10        # max requests per IP per endpoint group per window
      window: PT60S       # the fixed window length (60 seconds)
  identity:
    firebase:
      # project-id is intentionally LEFT UNSET here. While unset, the FAKE phone
      # verifier is active (accepts only dev:<10-digit-phone> tokens). In
      # production, set it (e.g. export FIREBASE_PROJECT_ID / pass
      # -Dtownbasket.identity.firebase.project-id=<id>) to activate the real
      # Google-signed-token verifier and disable the fake — a hard security
      # requirement. Do NOT give it an empty-string default: an empty value
      # would still count as "present" and wrongly activate the real verifier.
  catalog:
    transliteration:
      # Auto-fill Kannada product names (catalog.products.name_kn) so customers
      # browsing in Kannada see transliterated names; the storefront falls back to
      # the English name when blank. OFF by default (and in tests) so no external
      # calls happen unless opted in — enable with CATALOG_TRANSLITERATION_ENABLED.
      # A periodic background sweep (ProductNameBackfillJob) drains products that
      # have no Kannada name yet, including ones added later by import. For a fast
      # initial drain of a large catalogue, lower the interval / raise the batch.
      enabled: ${CATALOG_TRANSLITERATION_ENABLED:false}
      endpoint: https://inputtools.google.com/request
      itc: kn-t-i0-und
      batch-size: ${CATALOG_TRANSLITERATION_BATCH_SIZE:25}
      backfill-initial-delay-ms: ${CATALOG_TRANSLITERATION_INITIAL_DELAY_MS:30000}
      backfill-interval-ms: ${CATALOG_TRANSLITERATION_INTERVAL_MS:300000}
  serviceability:
    # TESTING ONLY: override the store's base coordinates for the 5 km gate so you
    # can test serviceability from your OWN location without changing the seeded
    # store. Set BOTH (env TOWNBASKET_SERVICEABILITY_STORE_LAT / _LNG). Unset in
    # production; a blank/malformed value is ignored (falls back to the seeded store).
    # store-lat: 12.9716
    # store-lng: 77.5946
