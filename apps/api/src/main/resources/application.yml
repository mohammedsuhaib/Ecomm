spring:
  application:
    name: town-basket-api

  datasource:
    # Env-var driven so the same image runs locally (docker-compose) and in prod.
    url: ${DB_URL:jdbc:postgresql://localhost:5432/townbasket}
    username: ${DB_USERNAME:townbasket}
    password: ${DB_PASSWORD:townbasket}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # The schema is owned by Flyway migrations; JPA only validates against it.
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    # Schema-per-module: each module owns a Postgres schema and its own
    # migration folder. Flyway tracks history in the dedicated `flyway` schema
    # so no single module schema owns the migration metadata.
    schemas: flyway
    default-schema: flyway
    create-schemas: true
    locations:
      - classpath:db/migration/shared
      - classpath:db/migration/identity
      - classpath:db/migration/catalog
      - classpath:db/migration/inventory
      - classpath:db/migration/cart
      - classpath:db/migration/orders
      - classpath:db/migration/payments
      - classpath:db/migration/serviceability
      - classpath:db/migration/notifications

# Spring Modulith event publication registry (transactional outbox on Postgres).
modulith:
  events:
    jdbc:
      schema-initialization:
        enabled: false   # Schema is created by Flyway (see shared migration).
    republish-outstanding-events-on-restart: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

server:
  port: 8080
  shutdown: graceful

logging:
  level:
    root: INFO
