# Production stack (DigitalOcean droplet). Skeleton — finalised in M6.
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Images are pre-built and pushed by CI; ${REGISTRY} and ${TAG} come from the
# root-restricted .env on the droplet (never committed).
services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - storefront
      - admin
      - delivery

  api:
    image: ${REGISTRY}/town-basket-api:${TAG:-latest}
    restart: unless-stopped
    environment:
      # Recommended: point at DO Managed Postgres.
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      # App-issued JWT signing key — MUST be a real, random, >=32-byte secret
      # (the in-repo dev default is insecure and only for local dev).
      JWT_SECRET: ${JWT_SECRET}
      # Set to your Firebase projectId to enable REAL phone-OTP (disables the
      # offline dev fake verifier). A present-but-BLANK value makes the API refuse
      # to start (fail-safe — verified: both verifiers match -> no unique bean ->
      # boot fails; it is NOT a silent downgrade to the fake). So set a real
      # projectId in prod; to intentionally run the offline fake, remove this line.
      TOWNBASKET_IDENTITY_FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    expose:
      - "8080"

  storefront:
    image: ${REGISTRY}/town-basket-storefront:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://api.town-basket.com/api/v1
      # NOTE: NEXT_PUBLIC_FIREBASE_* are inlined by Next.js at IMAGE BUILD time,
      # NOT here — pass them as build args when CI builds the storefront image
      # (see .env.example + apps/storefront/Dockerfile). Runtime values are ignored.
    expose:
      - "3000"

  admin:
    image: ${REGISTRY}/town-basket-admin:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://api.town-basket.com/api/v1
    expose:
      - "3001"

  delivery:
    image: ${REGISTRY}/town-basket-delivery:${TAG:-latest}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_BASE_URL: https://api.town-basket.com/api/v1
    expose:
      - "3002"

  # Optional self-hosted Postgres (fallback to DO Managed Database).
  # Uncomment only for a cost-sensitive single-box deployment.
  # postgres:
  #   image: postgres:16-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: ${DB_USERNAME}
  #     POSTGRES_PASSWORD: ${DB_PASSWORD}
  #     POSTGRES_DB: townbasket
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

volumes:
  caddy_data:
  caddy_config:
  # pgdata:
